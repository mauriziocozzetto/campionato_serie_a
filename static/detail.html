<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Partita</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0f172a] text-white min-h-screen">

    <div id="match-header"
        class="relative h-64 md:h-80 bg-slate-800 flex items-center justify-center border-b-4 border-cyan-500 overflow-hidden">
        <div class="absolute inset-0 opacity-20 bg-cover bg-center"
            style="background-image: url('https://www.legaseriea.it/assets/images/placeholder/stadium.jpg');"></div>
        <div id="header-content" class="relative z-10 flex flex-col items-center w-full">
        </div>
    </div>

    <div class="max-w-2xl mx-auto p-6 md:p-12">
        <div class="flex items-center justify-center space-x-4 mb-10">
            <div class="h-px bg-slate-800 flex-1"></div>
            <h3 class="text-slate-400 uppercase tracking-widest text-sm font-bold">Tabella risultati</h3>
            <div class="h-px bg-slate-800 flex-1"></div>
        </div>

        <div id="scorers-grid" class="grid grid-cols-2 gap-4 relative">
            <div class="absolute left-1/2 top-0 bottom-0 w-px bg-slate-800 hidden md:block"></div>
            <div id="home-scorers" class="space-y-6 pr-4 md:pr-10 text-right"></div>
            <div id="away-scorers" class="space-y-6 pl-4 md:pl-10 text-left"></div>
        </div>

        <div class="mt-20 text-center">
            <a href="/"
                class="inline-flex items-center space-x-2 text-slate-500 hover:text-cyan-400 transition-colors font-bold uppercase text-xs tracking-widest">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Torna al Calendario</span>
            </a>
        </div>
    </div>

    <script>
        // Funzione aggiornata per la pagina di dettaglio
        function createIcon(team) {
            const initial = team.name.charAt(0).toUpperCase();
            return `
        <div class="w-20 h-20 md:w-24 md:h-24 mx-auto mb-3 bg-white rounded-full flex items-center justify-center shadow-2xl overflow-hidden">
            <img src="${team.logo_url}" 
                 style="display:none"
                 class="w-full h-full object-contain" 
                 onload="this.style.display='block'"
                 onerror="this.style.display='none'; this.parentElement.insertAdjacentHTML('beforeend', '<span style=&quot;color:#000000; font-size:48px; font-weight:900; display:block; line-height:1;&quot;>${initial}</span>')">
        </div>
    `;
        }

        async function loadMatchDetail() {
            const params = new URLSearchParams(window.location.search);
            const matchId = params.get('id');

            try {
                const response = await fetch(`/api/matches/${matchId}`);
                const match = await response.json();

                document.title = `${match.home_team.name} vs ${match.away_team.name}`;

                document.getElementById('header-content').innerHTML = `
                    <span class="text-xs uppercase tracking-[0.3em] font-bold text-cyan-400 mb-2">${match.date} - ${match.start_time}</span>
                    <span class="text-[10px] uppercase tracking-widest font-bold text-slate-400 mb-6">Matchday 28</span>

                    <div class="flex items-center justify-center space-x-6 md:space-x-16 w-full">
                        <div class="text-center w-32 md:w-48">
                            ${createIcon(match.home_team)}
                            <h1 class="text-xl md:text-3xl font-black uppercase  tracking-tighter">${match.home_team.name}</h1>
                        </div>

                        <div class="text-6xl md:text-8xl font-black flex items-center space-x-4">
                            <span>${match.home_score}</span>
                            <span class="text-2xl text-slate-500">-</span>
                            <span>${match.away_score}</span>
                        </div>

                        <div class="text-center w-32 md:w-48">
                            ${createIcon(match.away_team)}
                            <h1 class="text-xl md:text-3xl font-black uppercase  tracking-tighter">${match.away_team.name}</h1>
                        </div>
                    </div>
                    <span class="mt-6 font-bold text-xs tracking-[0.5em] text-white/40 uppercase">Finita</span>
                `;

                const homeContainer = document.getElementById('home-scorers');
                const awayContainer = document.getElementById('away-scorers');

                match.scorers.forEach(s => {
                    const html = `
                        <div class="group">
                            <span class="block font-black text-xl leading-none text-white group-hover:text-cyan-400 transition-colors">${s.name}</span>
                            <span class="text-cyan-500 text-sm font-mono font-bold">${s.minute}'</span>
                        </div>
                    `;
                    s.team_side === 'home' ? homeContainer.innerHTML += html : awayContainer.innerHTML += html;
                });

            } catch (err) {
                document.getElementById('header-content').innerHTML = "Errore caricamento.";
            }
        }
        window.onload = loadMatchDetail;
    </script>
</body>

</html>
